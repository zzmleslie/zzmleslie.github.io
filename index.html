<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zzm's Garden</title>
<style>
  /* ====== 自定义字体 ====== */
  @font-face {
    font-family: 'huiwen';
    src: url('/font/huiwen.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #0a0a0f;
    --text: rgba(255,255,255,0.85);
    --dim: rgba(255,255,255,0.5);
    --cyan: #64CEDC;
    --pink: #B83B8D;
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'huiwen', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    height: 100vh;
    overflow: hidden;
    cursor: default;
  }

  /* ====== Canvas 粒子背景 ====== */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ====== 光晕装饰 ====== */
  .aurora {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .aurora-1 {
    width: 600px; height: 600px;
    background: var(--cyan);
    top: -200px; right: -100px;
    animation: auroraFloat 12s ease-in-out infinite;
  }
  .aurora-2 {
    width: 500px; height: 500px;
    background: var(--pink);
    bottom: -150px; left: -100px;
    animation: auroraFloat 15s ease-in-out infinite reverse;
  }

  @keyframes auroraFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, -30px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* ====== 右侧导航 ====== */
  .nav-links {
    position: fixed;
    right: 8vw;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: flex-end;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--dim);
    font-size: 1.3em;
    font-weight: 400;
    letter-spacing: 0.04em;
    padding: 10px 24px;
    border-radius: 9999px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    position: relative;
    overflow: hidden;
  }

  .nav-links a::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 9999px;
    background: linear-gradient(135deg, rgba(100,206,220,0.15), rgba(184,59,141,0.1));
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .nav-links a:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.2);
    transform: translateX(-8px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 40px rgba(100,206,220,0.08);
  }

  .nav-links a:hover::before {
    opacity: 1;
  }

  .nav-links a .icon {
    margin-right: 8px;
    font-size: 0.9em;
  }

  /* ====== 左侧大标题 ====== */
  .hero-text {
    position: fixed;
    left: 8vw;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
  }

  .hero-text .greeting {
    font-size: 1.1em;
    color: var(--dim);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }

  .hero-text .title {
    font-size: 3.5em;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(210,195,184,0.8) 50%, rgba(100,206,220,0.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-text .subtitle {
    font-size: 1em;
    color: var(--dim);
    margin-top: 16px;
    letter-spacing: 0.04em;
    opacity: 0.7;
  }

  /* ====== 底部提示 ====== */
  .hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--dim);
    font-size: 0.85em;
    letter-spacing: 0.06em;
    z-index: 10;
    opacity: 0.5;
  }

  /* ====== 响应式 ====== */
  @media (max-width: 768px) {
    .hero-text { left: 6vw; }
    .hero-text .title { font-size: 2.2em; }
    .nav-links { right: 6vw; gap: 14px; }
    .nav-links a { font-size: 1em; padding: 8px 18px; }
  }
</style>
</head>
<body>

<!-- 光晕 -->
<div class="aurora aurora-1"></div>
<div class="aurora aurora-2"></div>

<!-- 粒子画布 -->
<canvas id="particles"></canvas>

<!-- 左侧文字 -->
<div class="hero-text">
  <div class="greeting">✦ 欢迎来到</div>
  <div class="title">Zzm's<br>Garden</div>
  <div class="subtitle">一个正在学习的技术小白 ( ⁄•⁄ω⁄•⁄ )</div>
</div>

<!-- 右侧导航 -->
<div class="nav-links">
  <a href="/home/"><span class="icon">🏠</span>Home</a>
  <a href="/about/"><span class="icon">👤</span>About</a>
  <a href="/archives/"><span class="icon">📦</span>Archives</a>
  <a href="/tags/"><span class="icon">🏷️</span>Tags</a>
</div>

<!-- 底部 -->
<div class="hint">scroll or click to explore ↓</div>

<script>
// ====== 粒子系统 ======
const canvas = document.getElementById('particles')
const ctx = canvas.getContext('2d')
let particles = []
let mouseX = 0, mouseY = 0

function resize() {
  canvas.width = window.innerWidth
  canvas.height = window.innerHeight
}
resize()
window.addEventListener('resize', resize)

class Particle {
  constructor() {
    this.reset()
    this.y = Math.random() * canvas.height
  }
  reset() {
    this.x = Math.random() * canvas.width
    this.y = -10
    this.size = Math.random() * 1.5 + 0.5
    this.speed = Math.random() * 0.4 + 0.1
    this.opacity = Math.random() * 0.4 + 0.1
    this.wobble = Math.random() * Math.PI * 2
    this.wobbleSpeed = Math.random() * 0.01 + 0.002
  }
  update() {
    this.y += this.speed
    this.wobble += this.wobbleSpeed
    this.x += Math.sin(this.wobble) * 0.3
    // 鼠标吸引
    const dx = mouseX - this.x
    const dy = mouseY - this.y
    const dist = Math.sqrt(dx * dx + dy * dy)
    if (dist < 150) {
      this.x += dx * 0.001
      this.y += dy * 0.001
    }
    if (this.y > canvas.height + 10) this.reset()
  }
  draw() {
    ctx.beginPath()
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2)
    ctx.fillStyle = `rgba(255,255,255,${this.opacity})`
    ctx.fill()
  }
}

// 初始化粒子
for (let i = 0; i < 80; i++) {
  const p = new Particle()
  p.y = Math.random() * canvas.height
  particles.push(p)
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  particles.forEach(p => { p.update(); p.draw() })
  requestAnimationFrame(animate)
}
animate()

document.addEventListener('mousemove', e => {
  mouseX = e.clientX
  mouseY = e.clientY
})
</script>

</body>
</html>
