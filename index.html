<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Only Twenty Three</title>
<style>
  @font-face {
    font-family: 'huiwen';
    src: url('/font/huiwen.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --text: rgba(255,255,255,0.85);
    --dim: rgba(255,255,255,0.5);
    --cyan: #64CEDC;
    --pink: #B83B8D;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: var(--text);
    font-family: 'huiwen', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    height: 100vh;
    overflow: hidden;
    cursor: default;
  }

  /* ====== 全幅背景图 ====== */
  .bg-image {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('/image/Only_Twenty_Threel.jpg') center/cover no-repeat;
  }

  /* ====== 暗角晕染遮罩 ====== */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 35%,
      rgba(10,10,15,0.2) 55%,
      rgba(10,10,15,0.5) 75%,
      rgba(10,10,15,0.85) 100%
    );
  }

  /* ====== Canvas 粒子 ====== */
  #particles {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.4;
  }

  /* ====== 右侧导航 ====== */
  .nav-links {
    position: fixed;
    right: 8vw;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: flex-end;
  }
  .nav-links a {
    text-decoration: none;
    color: var(--dim);
    font-size: 1.3em;
    font-weight: 400;
    letter-spacing: 0.04em;
    padding: 10px 24px;
    border-radius: 9999px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    position: relative;
    overflow: hidden;
  }
  .nav-links a::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 9999px;
    background: linear-gradient(135deg, rgba(100,206,220,0.15), rgba(184,59,141,0.1));
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .nav-links a:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.22);
    transform: translateX(-8px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 40px rgba(100,206,220,0.08);
  }
  .nav-links a:hover::before { opacity: 1; }
  .nav-links a .icon { margin-right: 8px; font-size: 0.9em; }

  /* ====== 左侧欢迎语 ====== */
  .hero-text {
    position: fixed;
    left: 8vw;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    text-align: left;
  }
  .hero-text .line1 {
    font-size: 1.3em;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .hero-text .line2 {
    font-size: 1.05em;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
  }

  /* ====== 底部 ====== */
  .hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--dim);
    font-size: 0.85em;
    letter-spacing: 0.06em;
    z-index: 10;
    opacity: 0.5;
  }

  @media (max-width: 768px) {
    .nav-links { right: 6vw; gap: 14px; }
    .nav-links a { font-size: 1em; padding: 8px 18px; }
  }
</style>
</head>
<body>

<div class="bg-image"></div>
<div class="vignette"></div>
<canvas id="particles"></canvas>

<div class="nav-links">
  <a href="/home/"><span class="icon">🏠</span>Home</a>
  <a href="/notes/"><span class="icon">💬</span>Notes</a>
  <a href="/gallery/"><span class="icon">🎨</span>Gallery</a>
  <a href="/library/"><span class="icon">📚</span>Library</a>
  <a href="/projects/"><span class="icon">🔬</span>Projects</a>
  <a href="/archives/"><span class="icon">📦</span>Archives</a>
</div>

<!-- 左侧欢迎语 -->
<div class="hero-text">
  <div class="line1">嘻嘻，你来了呀 ~</div>
  <div class="line2">那就进来坐坐，听我叨叨两句叭 ~</div>
</div>

<div class="hint">在千寻之外，你依然存在，永远的怀念</div>

<script>
// ====== 粒子系统 ======
const canvas = document.getElementById('particles')
const ctx = canvas.getContext('2d')
let particles = []
let mouseX = 0, mouseY = 0

function resize() {
  canvas.width = window.innerWidth
  canvas.height = window.innerHeight
}
resize()
window.addEventListener('resize', resize)

class Particle {
  constructor() {
    this.reset()
    this.y = Math.random() * canvas.height
  }
  reset() {
    this.x = Math.random() * canvas.width
    this.y = -10
    this.size = Math.random() * 1.5 + 0.5
    this.speed = Math.random() * 0.4 + 0.1
    this.opacity = Math.random() * 0.4 + 0.1
    this.wobble = Math.random() * Math.PI * 2
    this.wobbleSpeed = Math.random() * 0.01 + 0.002
  }
  update() {
    this.y += this.speed
    this.wobble += this.wobbleSpeed
    this.x += Math.sin(this.wobble) * 0.3
    // 鼠标吸引
    const dx = mouseX - this.x
    const dy = mouseY - this.y
    const dist = Math.sqrt(dx * dx + dy * dy)
    if (dist < 150) {
      this.x += dx * 0.001
      this.y += dy * 0.001
    }
    if (this.y > canvas.height + 10) this.reset()
  }
  draw() {
    ctx.beginPath()
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2)
    ctx.fillStyle = `rgba(255,255,255,${this.opacity})`
    ctx.fill()
  }
}

// 初始化粒子
for (let i = 0; i < 80; i++) {
  const p = new Particle()
  p.y = Math.random() * canvas.height
  particles.push(p)
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  particles.forEach(p => { p.update(); p.draw() })
  requestAnimationFrame(animate)
}
animate()

document.addEventListener('mousemove', e => {
  mouseX = e.clientX
  mouseY = e.clientY
})
</script>

</body>
</html>
